<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>내 새 목록</title>

    <style>
        body {
            margin: 0;
            padding: 40px;
            font-family: Arial, sans-serif;
            background: #f6f7fb;
            color: #222;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 {
            margin: 0;
            font-size: 32px;
        }

        .draw-button {
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            background: #ffcc66;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.12);
        }

        .message {
            background: #fff3cd;
            border: 1px solid #ffe08a;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .bird-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 22px;
        }

        .bird-card {
            background: white;
            border-radius: 20px;
            padding: 22px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .bird-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 28px rgba(0,0,0,0.14);
        }

        .bird-image-wrap {
            height: 190px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(180deg, #fff, #f0f3ff);
            border-radius: 16px;
            margin-bottom: 18px;
        }

        .bird-image {
            max-width: 160px;
            max-height: 170px;
            object-fit: contain;
        }

        .bird-name {
            margin: 0 0 10px;
            font-size: 22px;
        }

        .info {
            margin: 7px 0;
            font-size: 14px;
        }

        .rarity-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: bold;
            color: white;
        }

        .COMMON {
            background: #777;
        }

        .RARE {
            background: #2f80ed;
        }

        .EPIC {
            background: #9b51e0;
        }

        .LEGENDARY {
            background: #f2a900;
        }

        .progress-box {
            margin-top: 12px;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 5px;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e5e7eb;
            border-radius: 999px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #ff9f43;
            border-radius: 999px;
        }

        .detail-link {
            display: block;
            margin-top: 18px;
            text-align: center;
            padding: 10px;
            border-radius: 12px;
            background: #222;
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .home-link {
            display: inline-block;
            margin-top: 30px;
            color: #555;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="page-header">
        <h1>🐣 내 새 목록</h1>

        <form action="/birds/draw" method="post">
            <button class="draw-button" type="submit">🥚 새 뽑기</button>
        </form>
    </div>

    <p class="message" th:if="${message}" th:text="${message}"></p>

    <div class="bird-grid">
        <div class="bird-card" th:each="bird : ${birds}">
            <div class="bird-image-wrap">
                <img class="bird-image" th:src="@{${bird.imageUrl}}" alt="새 이미지">
            </div>

            <h2 class="bird-name" th:text="${bird.name}">새 이름</h2>

            <p class="info">
                등급:
                <span class="rarity-badge"
                      th:text="${bird.rarity}"
                      th:classappend="' ' + ${bird.rarity}">
                    COMMON
                </span>
            </p>

            <p class="info">성장 단계: <span th:text="${bird.stage}">알</span></p>
            <p class="info">알 무늬: <span th:text="${bird.eggPattern}">기본 알</span></p>
            <p class="info">부화 확률: <span th:text="${bird.hatchRate}">70</span>%</p>
            <p>성격: <span th:text="${bird.personality.label}"></span></p>

            <div class="progress-box">
                <div class="progress-label">
                    <span>친밀도</span>
                    <span th:text="${bird.affection} + '/100'">0/100</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill"
                         th:style="'width:' + ${bird.affection} + '%'">
                    </div>
                </div>
            </div>

            <a class="detail-link" th:href="@{/birds/{id}(id=${bird.id})}">
                자세히 보기
            </a>
        </div>
    </div>

    <a class="home-link" href="/">← 홈으로</a>

</body>
</html>
