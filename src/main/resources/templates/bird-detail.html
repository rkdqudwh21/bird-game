<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>새 상세</title>
</head>
<body>

<h1 th:text="${birdName}">새 이름</h1>

<p>성장 단계: <span th:text="${birdStage}">알</span></p>
<p>친밀도: <span th:text="${affection}">0</span></p>

<form th:action="@{/birds/{id}/feed(id=${birdId})}" method="post">
    <button type="submit">🍞 먹이주기</button>
</form>

<p th:if="${message}" th:text="${message}">메시지</p>

<br>
<a href="/birds">← 목록으로</a>

</body>
</html>
